<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Los Números Enteros</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --azul: #1A3C6E; --verde: #2ECC8A; --naranja: #F4A127;
      --fondo: #F9F9F6; --texto: #2D2D2D; --blanco: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* El body oculta la barra de scroll externa porque los iframes tendrán la suya */
    body { 
      font-family: 'Open Sans', sans-serif; 
      background: var(--fondo); 
      color: var(--texto); 
      overflow: hidden; 
    }

    /* NAVBAR FIJO */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background: var(--azul);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 62px; box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .nav-logo { font-family: 'Nunito', sans-serif; font-weight: 900; color: var(--blanco); font-size: 1.25rem; cursor: pointer; }
    .nav-logo span { color: var(--naranja); }
    .nav-links { display: flex; gap: 0.4rem; list-style: none; }
    .nav-links a {
      font-family: 'Nunito', sans-serif; font-weight: 600; color: rgba(255,255,255,0.85);
      padding: 0.4rem 0.9rem; border-radius: 20px; font-size: 0.9rem; cursor: pointer;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--verde); color: var(--azul); }

    /* FOOTER FIJO */
    footer {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
      background: var(--azul); color: rgba(255,255,255,0.7); text-align: center;
      padding: 10px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; height: 40px;
    }
    footer span { color: var(--naranja); font-weight: 700; }

    /* PAGINAS */
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* CONTENEDOR DE VENTANAS INTERNAS (IFRAMES) */
    .iframe-container {
      position: absolute;
      top: 62px; /* Empieza exactamente debajo del navbar */
      bottom: 40px; /* Termina exactamente encima del footer */
      left: 0;
      right: 0;
      width: 100%;
    }
    .iframe-container iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block; 
    }
  </style>
</head>

<body>

<nav>
  <div class="nav-logo" onclick="showPage('inicio')">ℤ <span>Enteros</span></div>
  <ul class="nav-links">
    <li><a id="nav-inicio"   onclick="showPage('inicio')"   class="active">Inicio</a></li>
    <li><a id="nav-teoria"   onclick="showPage('teoria')"   >Teoría</a></li>
    <li><a id="nav-practica" onclick="showPage('practica')" >Práctica</a></li>
  </ul>
</nav>

<!-- PÁGINA 1: INICIO -->
<div id="page-inicio" class="page active">
  <div class="iframe-container">
    <iframe src="./inicio_numeros_enteros.html" title="Inicio"></iframe>
  </div>
</div>

<!-- PÁGINA 2: TEORÍA -->
<div id="page-teoria" class="page">
  <div class="iframe-container">
    <iframe src="./teoria-2-2.html" title="Teoría"></iframe>
  </div>
</div>

<!-- PÁGINA 3: PRÁCTICA -->
<div id="page-practica" class="page">
  <div class="iframe-container">
    <iframe src="./practica-3.html" title="Práctica"></iframe>
  </div>
</div>

<footer>
  Diseñado con ❤️ para estudiantes de <span>Grado 7°</span> · Los Números Enteros · ℤ
</footer>

<script>
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('nav-' + id).classList.add('active');
  }
</script>

</body>
</html>
